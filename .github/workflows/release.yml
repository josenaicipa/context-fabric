# Tag-driven release: runs only on v* tags, never in normal CI.
#
# Publishing requires the `npm-publish` environment (configure reviewers /
# branch-tag protection in repo settings) and an `NPM_TOKEN` secret. If the
# secret is absent the publish step is skipped cleanly instead of failing, so
# tagging in a fork or before npm is configured is safe.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  verify:
    name: Full release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Doctor, lint, build, test, benchmark, pack/install smoke
        run: npm run release:check

  publish:
    name: Publish @context-fabric/sdk
    runs-on: ubuntu-latest
    needs: verify
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # npm --provenance attestation
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Skip publish (NPM_TOKEN not configured)
        if: env.NODE_AUTH_TOKEN == ''
        run: echo "NPM_TOKEN secret is not configured; skipping npm publish."
      - name: Publish to npm with provenance
        if: env.NODE_AUTH_TOKEN != ''
        run: npm publish --workspace @context-fabric/sdk --provenance --access public
