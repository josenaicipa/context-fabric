name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctor:
    name: Boundary doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run boundary & hygiene checks
        run: bash scripts/doctor.sh

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    needs: doctor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check

  build-test:
    name: Build & test (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: doctor
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      # The suite includes the pack -> install -> installed-bin smoke test,
      # so this exercises the CLI/bin wiring on every OS in the matrix.
      - name: Test
        run: npm test

  release-check:
    name: Release gate (pack → install → bin smoke)
    runs-on: ubuntu-latest
    needs: [lint, build-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Run full release gate
        run: npm run release:check

  benchmark:
    name: Public benchmark artifact
    runs-on: ubuntu-latest
    needs: doctor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run public benchmark gate
        run: npm run benchmark -- artifacts/benchmarks
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: context-fabric-public-benchmark
          path: artifacts/benchmarks/
