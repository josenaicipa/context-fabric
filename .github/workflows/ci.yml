name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctor:
    name: Boundary doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run boundary & hygiene checks
        run: bash scripts/doctor.sh

  build-test:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: doctor
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test


  benchmark:
    name: Public benchmark artifact
    runs-on: ubuntu-latest
    needs: doctor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run public benchmark gate
        run: npm run benchmark -- artifacts/benchmarks
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: context-fabric-public-benchmark
          path: artifacts/benchmarks/
