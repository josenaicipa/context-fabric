name: Feature request
description: Propose a new capability or improvement for the public SDK.
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Proposals should fit the public SDK's scope: scope-aware routing,
        sanitization, and token budgeting. See `docs/ROADMAP.md` for direction
        and `docs/boundary.md` for what may live here.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: The API, behaviour, or config you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why they fall short.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This stays a pure, in-process library (no server, store, or network client).
          required: true
        - label: This requires no private/operator data or proprietary heuristics.
          required: true
