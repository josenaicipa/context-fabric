name: Bug report
description: Report incorrect or unexpected behaviour in the SDK or CLI.
title: "bug: <short description>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Do not paste secrets or private data.**
        Reduce examples to fictional scopes (`acme-shop`, `other-co`, `demo`).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: I called `fabric.assemble(...)` and ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal, runnable example using only fictional scopes.
      render: ts
      placeholder: |
        import { Fabric } from "@context-fabric/sdk";
        // ...
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: "@context-fabric/sdk version"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, stack traces (redacted), or context. No secrets.
    validations:
      required: false
  - type: checkboxes
    id: hygiene
    attributes:
      label: Confirmation
      options:
        - label: This report contains no secrets, credentials, or private/operator data.
          required: true
